version: '3'
services:
  database:
    container_name: n8e-database
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-directus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-n8elabs!}
      POSTGRES_DB: ${DB_DATABASE:-directus}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - directus-network

  directus:
    container_name: n8e-directus
    image: directus/directus:latest
    ports:
      - "8055:8055"
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
    environment:
      KEY: ${KEY:-generate-a-random-string}
      SECRET: ${SECRET:-generate-a-random-string}
      DB_CLIENT: 'pg'
      DB_HOST: 'database'
      DB_PORT: '5432'
      DB_DATABASE: ${DB_DATABASE:-directus}
      DB_USER: ${DB_USER:-directus}
      DB_PASSWORD: ${DB_PASSWORD:-n8elabs!}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@n8elabs.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin@n8elabs.com}
      PUBLIC_URL: 'http://localhost:8055'
    depends_on:
      - database
    networks:
      - directus-network

volumes:
  db_data:

networks:
  directus-network:
